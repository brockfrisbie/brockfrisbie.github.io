---
layout: default
---

<div class="blog-recent">
  <h2>Blog</h2>
  <ul class="blog-title-list">
    {% for post in site.posts %}
      <li>
        <h3><a href="{{ post.url }}">{{ post.title }}</a></h3>
        <span>{{ post.date | date: '%B %d, %Y' }}</span>
        {{ post.excerpt }}
      </li>
    {% endfor %}
  </ul>
</div>
